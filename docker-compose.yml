version: "3.8"

services:
  # PostgreSQL with PostGIS (using Supabase image already available)
  db:
    image: public.ecr.aws/supabase/postgres:17.6.1.095
    container_name: ev-log-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ev_log
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST - REST API for PostgreSQL (using Supabase image already available)
  postgrest:
    image: public.ecr.aws/supabase/postgrest:v14.5
    container_name: ev-log-api
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/ev_log
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3001
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      PGRST_JWT_AUD: "ev-logbook"
    ports:
      - "3001:3000"
    depends_on:
      - db

  # Next.js Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ev-log-app
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/ev_log
      - POSTGREST_URL=http://postgrest:3000
      - NEXTAUTH_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-nextauth-secret-change-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/styled-system
    ports:
      - "3000:3000"
    depends_on:
      - db
      - postgrest

volumes:
  postgres_data:
